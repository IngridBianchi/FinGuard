services:
  postgres:
    image: postgres:15-alpine
    container_name: finguard_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finguard_redis
    restart: always
    ports:
      - "6379:6379"

  backend-python:
    build: ./backend-python
    container_name: finguard-backend-python
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=finguard
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/finguard
    depends_on:
      - redis
      - postgres

  backend-node:
    build: ./backend-node
    container_name: finguard-backend-node
    ports:
      - "3001:3001"
    environment:
      - PYTHON_API_URL=http://backend-python:8000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/finguard
      - REDIS_URL=redis://redis:6379
    depends_on:
      - backend-python
      - redis
      - postgres

  frontend:
    build: ./frontend
    container_name: finguard-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_NODE_API_URL=http://localhost:3001
    depends_on:
      - backend-node

volumes:
  postgres_data:
